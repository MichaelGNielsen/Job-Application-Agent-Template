<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>{{DOC_TITLE}}</title>
    <style>
        @page {
            margin: 2cm;
            @bottom-right {
                content: counter(page);
            }
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0;
            color: #333; 
            line-height: 1.6;
            font-size: 11pt;
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid #ddd; 
            padding-bottom: 15px; 
            margin-bottom: 40px; 
        }
        .name-section h1 { 
            margin: 0; 
            font-size: 24pt;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }
        .contact-info { 
            text-align: right; 
            font-size: 9pt; 
            color: #666;
        }
        .contact-info p { margin: 2px 0; }
        .address-date-line { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px;
            font-weight: 500;
        }
        .content { 
            margin-top: 0;
        }
        h1, h2, h3 { color: #2c3e50; }
        h2 { font-size: 14pt; margin-top: 20pt; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* Pandoc specific styling */
        p { margin-bottom: 12pt; }
        ul, ol { margin-bottom: 12pt; padding-left: 20pt; }
        li { margin-bottom: 6pt; }
        
        .match-score { 
            background-color: #f0f7ff; 
            border: 1px solid #cce3ff; 
            padding: 20px; 
            border-radius: 8px; 
            margin: 30px 0; 
            text-align: center;
            font-size: 16pt;
            color: #0056b3;
            font-weight: bold;
        }
        .signature {
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="name-section">
            <h1>{{NAME}}</h1>
        </div>
        <div class="contact-info">
            {{ADDRESS_BLOCK}}
            <p>{{PHONE}}</p>
            <p>{{EMAIL}}</p>
        </div>
    </div>
    <div class="content">
        {{CONTENT}}
    </div>
    <div class="signature">
        {{SIGNATURE_SECTION}}
    </div>
</body>
</html>
